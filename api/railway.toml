[build]
builder = "nixpacks"

[deploy]
# Run Alembic migrations before the API starts so schema changes ship with
# the deploy. `alembic upgrade head` is idempotent (no-op when already
# current), so re-running on every boot is safe and cheap.
startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
